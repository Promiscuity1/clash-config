# -----------------------------------------------------------------------
# 【3】核心底层设置（这部分建议保持默认，除非你知道在干什么）
# -----------------------------------------------------------------------
mixed-port: 7890  # 本地代理端口（电脑上的其他软件通过 127.0.0.1:7890 连到代理）
allow-lan: true  # 允许局域网内的其他设备（比如手机、电视）连上你的热点后共享代理
bind-address: "*"  # 允许监听所有的网卡
ipv6: false  # 强烈建议关掉 IPv6，目前绝大多数乱七八糟的无法上网问题，都是因为开了 IPv6
unified-delay: true  # 让节点列表里的延迟数字显示得更接近实际感受（屏蔽握手时间）
tcp-concurrent: true  # 开启 TCP 并发：访问一个网站时同时发出多条请求，谁先连上用谁，大幅提升响应速度！
log-level: warning  # 日志级别：warning 不会打印太多废话卡界面，只有出错了才会提示
global-client-fingerprint: chrome  # 伪装你的网络指纹为 Chrome 浏览器（减少被防火墙封杀的概率）
keep-alive-idle: 600  # 连接空闲时，多久不说话才断开（单位：秒）
keep-alive-interval: 15  # 每隔多少秒发一次“心跳”确认对方还在不在

profile:  # 面板偏好记忆
  store-selected: true  # 非常重要！记住你在面板里选了哪个节点，重启电脑后不用重新选
  store-fake-ip: true  # 记住 DNS 解析记录，重启后打开网页更快

# -----------------------------------------------------------------------
# 【4】流量嗅探（让分流更精准的“X光机”）
# -----------------------------------------------------------------------
sniffer:  
  enable: true  # 开启。有些 App 强行用自己的 DNS 查出 IP 直接访问，容易导致我们的域名分流规则失效。嗅探可以从数据包里扒出真实的域名，让它乖乖按规则走。
  sniff:  
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:  # 排除部分不需要“被看透”的域名，避免它们报错断连
    - "Mijia Cloud"
    - "+.push.apple.com"

# -----------------------------------------------------------------------
# 【5】TUN 虚拟网卡模式（接管系统所有流量）
# -----------------------------------------------------------------------
tun:  
  enable: true  # 开启 TUN 模式，它会在系统中虚拟一块网卡，那些不支持填代理端口的软件（如绝大多数游戏）就会被强行抓进代理。
  stack: mixed  # 数据处理引擎选 mixed 兼容性最好
  dns-hijack: ["any:53", "tcp://any:53"]  # 劫持系统默认的 53 端口 DNS 请求，交给我们自己的系统处理
  auto-route: true  # 自动接管系统路由表
  auto-redirect: false  
  auto-detect-interface: true  # 自动寻找系统目前能上网的真实物理网卡

# -----------------------------------------------------------------------
# 【6】DNS 设置（非常！极度！重要！防 DNS 污染的核心）
# -----------------------------------------------------------------------
dns:  
  enable: true  
  cache-algorithm: arc  # 缓存淘汰算法，选 arc 命中率高，性能好
  listen: 0.0.0.0:1053  # DNS 服务的监听端口
  ipv6: false  # 再次强调，关掉 IPv6 烦恼少一半
  respect-rules: true  # 非常关键：让 DNS 解析过程也遵守下面【分流规则】的逻辑
  
  enhanced-mode: fake-ip  # Fake-IP（伪装 IP）模式。原理：请求网站时立刻返回一个假 IP，骗过浏览器立刻开始连接，真正连接时再去做真实的解析。大幅提升秒开速度。
  fake-ip-range: 28.0.0.1/8  # 发放的假 IP 范围（28.x.x.x 专门用来做这个）
  fake-ip-filter-mode: blacklist  # Fake-IP 黑名单模式：下面的域名老老实实去真实解析，不要给它们发假 IP
  fake-ip-filter:  
    - "rule-set:fakeipfilter_domain"  # 直接引用各大神整理好的“不兼容假IP的域名库”

  default-nameserver:  # 默认 DNS：用来解析下面的这些 DoH 地址本身的 IP（防死锁）
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:  # 代理 DNS：用来解析你的“节点服务器”域名（避免节点域名被污染）
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:  # 常规 DNS：正常用来解析国内网站的 IP
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# -----------------------------------------------------------------------
# 【7】策略组（也就是你在软件面板里看到的那些切换按钮）
# -----------------------------------------------------------------------
# 注：所有组均配置了 include-all
# 这意味着，你的自建节点通通都会被塞进下面这些组里供你选择！
proxy-groups:  
  # 1. 总司令部（几乎所有普通国外流量默认指向此地）
  - {name: 默认代理, type: select, include-all: true}

  # 2. 定制服务（给特定的 APP 设置特定的线路。如果你不想管，就手动选跟【默认代理】一致）
  - {name: AI 服务, type: select, proxies: [美国节点, 日本节点, 新加坡节点, 台湾节点, 其他地区, 直连]}  # 专门给 ChatGPT、Claude、Gemini 用
  - {name: YouTube, type: select, proxies: [默认代理, 美国节点, 日本节点, 新加坡节点, 台湾节点, 其他地区, 直连]}  
  - {name: Google, type: select, proxies: [默认代理, 美国节点, 日本节点, 新加坡节点, 台湾节点, 其他地区, 直连]}  
  - {name: Telegram, type: select, proxies: [默认代理, 美国节点, 日本节点, 新加坡节点, 台湾节点, 其他地区, 直连]}  
  - {name: GitHub, type: select, proxies: [默认代理, 美国节点, 日本节点, 新加坡节点, 台湾节点, 其他地区, 直连]}
  - {name: discord, type: select, proxies: [默认代理, 美国节点, 日本节点, 新加坡节点, 台湾节点,其他地区]}
  - {name: Microsoft, type: select, proxies: [默认代理, 美国节点, 日本节点, 新加坡节点, 台湾节点, 其他地区, 直连]}  

  # 3. 兜底（如果一切规则都没有命中，未知的流量去哪？）
  - {name: 漏网之鱼, type: select, proxies: [默认代理, 直连]}

  # 4. 地区智能筛选区（利用正则表达式 filter，自动根据节点名称上的国旗、汉字或字母把节点分类）
  - {name: 新加坡节点, type: select, include-all: true, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|TW|日|JP|韩|KR|深|美|US|港|HK)).)*$"}  
  - {name: 日本节点, type: select, include-all: true, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|HK|台|TW|韩|KR|新|SG|美|US)).)*$"}  
  - {name: 美国节点, type: select, include-all: true, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|HK|台|TW|韩|KR|新|SG|日|JP)).)*$"}  
  - {name: 台湾节点, type: select, include-all: true, filter: "(?=.*(台|TW|(?i)Taiwan))^((?!(港|HK|日|JP|韩|KR|新|SG|美|US)).)*$"}  
  - {name: 其他地区, type: select, include-all: true, filter: "^((?!(新加坡|坡|狮城|SG|Singapore|日|JP|Japan|美|US|States|America|台|TW|Taiwan|港|HK|Hong|直连)).)*$"}  


# -----------------------------------------------------------------------
# 【8】分流规则（交通警察！判断你访问的网址该走哪条路）
# -----------------------------------------------------------------------
# 重点规则：匹配是“从上往下”依次过滤的！上面的优先，匹配成功就放跑，不看下面了。
rules:  
  # --- 第一梯队：内网隔离（不要把家里路由器的地址乱报给国外节点，既浪费又没用） ---
  - RULE-SET,private_ip,直连,no-resolve  # 比如你家的 192.168.1.1 路由器后台
  - RULE-SET,private_domain,直连  # 内网特殊的局域网域名，直接不走代理

  # --- 第二梯队：各种特色敏感业务精准分流（越敏感越靠前） ---
  # 自定义域名强制代理（排在此处优先匹配，确保不走直连）
  - DOMAIN-SUFFIX,free.28.al,默认代理
  - DOMAIN-SUFFIX,emby.ichinosekotomi.com,默认代理

  # AI 领域容易封号，所以排在前面优先匹配，保证万无一失
  - RULE-SET,openai_domain,AI 服务  
  - RULE-SET,gemini_domain,AI 服务  
  - RULE-SET,claude_domain,AI 服务  
  - RULE-SET,ai_ip,AI 服务  # 防止有些 AI 不通过域名而是裸 IP 连接
  
  # 常见的主流大厂外网应用
  - RULE-SET,github_domain,GitHub
  - RULE-SET,microsoft_domain,Microsoft
  - RULE-SET,youtube_domain,YouTube  
  - RULE-SET,telegram_domain,Telegram  
  - RULE-SET,telegram_ip,Telegram  # TG经常直接通过IP连接，所以必须配IP规则
  - RULE-SET,discord_domain,discord
  - RULE-SET,google_domain,Google
  - RULE-SET,google_ip,Google  

  # --- 第三梯队：苹果服务和国内直连 ---
  # 苹果的很多基础服务在国内有服务器，走直连体验最好（速度快而且省节点流量）
  - RULE-SET,apple-cn_domain,直连
  - RULE-SET,apple@cn_domain,直连
  - RULE-SET,apple_ip,直连

  # 【超级核心大拦截】：用了一个反向操作：所有不属于中国的网络（!cn）全部被拦截去拉去走代理！
  - RULE-SET,geolocation-!cn,默认代理  

  # 如果上面的规则都没拦截住它（说明它是属于中国的），漏下来之后让它全部原路返回（直连）。
  - RULE-SET,cn_domain,直连  
  - RULE-SET,cn_ip,直连  

  # --- 第四梯队：最后兜底 ---
  # 那些既不在国内库，也不在国外库的孤儿流量怎么处理？统一切给【漏网之鱼】组
  - MATCH,漏网之鱼  

# -----------------------------------------------------------------------
# 【9】规则集和下载源（软件如何自动更新那些几十万字的规则表）
# -----------------------------------------------------------------------
# 规则太多了（比如哪个是中国网址，哪个是外国网址），直接塞在这个文件里会卡死软件。
# 所以我们在下面配好下载链接，利用 RULE-SET 指令让系统定期自己去云端拉取更新版本！

rule-anchor:  # 这是一个“模板克隆机”，为了能让你下面写的代码少一点、工整一点。
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}  # 定义了：每天（86400秒）自动去更新一次旧版的 mrs 格式字典
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  ip_yaml: &ip_yaml {type: http, interval: 86400, behavior: ipcidr, format: yaml} # 我们当前主要用这个：yaml 格式的 IP 字典
  domain_yaml: &domain_yaml {type: http, interval: 86400, behavior: domain, format: yaml}  # 当前主要用这个：yaml 格式的纯域名字典
  classical_yaml: &classical_yaml {type: http, interval: 86400, behavior: classical, format: yaml}  # 兼容带有 DOMAIN-SUFFIX 参数的杂交经典字典模板

rule-providers:  # 词典下载单列表（所有的名字都跟你在【8】里写的对应！）
  # （提示：每次你改动了链接或者加了新字典库，必须去 Clash 的 Providers 界面点击一下强制刷新！）
  
  # --- 域名字典单（存放具体的网址比如 google.com）---
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}
  private_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml"}
  youtube_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.yaml"}
  telegram_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.yaml"}
  openai_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.yaml"}
  gemini_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.yaml"}
  claude_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/anthropic.yaml"}
  github_domain: { <<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.yaml"}
  discord_domain: { <<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/discord.yaml"}
  microsoft_domain: { <<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.yaml"}
  google_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.yaml"}
  geolocation-!cn: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.yaml"}
  cn_domain: {<<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.yaml"}
  apple-cn_domain: { <<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple-cn.yaml"}
  apple@cn_domain: { <<: *domain_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple@cn.yaml"}
  
  # --- IP 字典单（当一个应用不说他去哪个网站，直接给服务器填纯数字 IP 时，就会用到这里兜底识别）---
  private_ip: {<<: *ip_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml"}
  ai_ip: {<<: *ip_yaml, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/ai.yaml"}
