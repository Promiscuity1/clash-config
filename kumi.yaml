rule-anchor:  # 规则源模板（复用配置）
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}  # IP 规则集模板（mrs 格式）
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}  # Domain 规则集模板（mrs 格式）
