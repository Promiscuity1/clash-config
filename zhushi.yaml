# 但开放到 0.0.0.0 有安全风险，建议仅本机使用并设置 secret
# =========================================================
#external-controller: 0.0.0.0:9095
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"


# =========================================================
# ===== 嗅探 sniffer =====
# 嗅探的作用：从流量中识别真实目标域名，帮助更准确地匹配规则
# 比如某些流量只有 IP，没有显式域名，开启后更利于分流
# =========================================================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]         # 在这些端口上嗅探 HTTP
      override-destination: true     # 嗅探到真实域名后，用真实域名覆盖目标
    TLS:
      ports: [443, 8443]             # 在这些端口上嗅探 TLS/HTTPS
    QUIC:
      ports: [443, 8443]             # 在这些端口上嗅探 QUIC/HTTP3

  # 这些域名不进行嗅探
  # 常见原因：
  # 1. 局域网服务
  # 2. Apple/推送/证书服务
  # 3. 某些容易因为嗅探出问题的服务
  skip-domain:
    - "+.lan"
    - "+.local"
    - "+.test"
    - "+.example"
    - "+.invalid"
    - "+.bogon"
    - "+.internal"
    - "+.localdomain"
    - "+.home.arpa"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "+.wpad"
    - "+.wpad.local"
    - "+.wpad.lan"
    - "+._dns.resolver.arpa"
    - "+._dns-sd._udp.local"
    - "+._dns-sd._udp.lan"
    - "+._googlecast._tcp.local"
    - "+._apple-mobdev2._tcp.local"
    - "+._universal-control._tcp.local"
    - "+._sleep-proxy._udp.local"
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.adobe.io"
    - "+.mail.me.com.akadns.net"
    - "+.mail.icloud.com.cn"
    - "+.mail.me.com"
    - "+.certs-lb.apple.com.akadns.net"
    - "+.certs.apple.com"
    - "+.crl-lb.apple.com.akadns.net"
    - "+.crl.apple.com"
    - "+.ocsp-lb.apple.com.akadns.net"
    - "+.ocsp.apple.com"
    - "+.ocsp2-lb.apple.com.akadns.net"
    - "+.ocsp2.apple.com"
    - "+.valid.apple.com"
    - "+.valid.origin-apple.com.akadns.net"
    - "+.ohttp-relay1.fastly-edge.com"
    - "+.weatheroffer.com"
    - "+.xp.apple.com"
    - "*.cfyes.lxy1015.top"
    - "*.ceeg.cn"
    - "*.tencentapp.cn"
