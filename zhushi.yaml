# =========================================================
# ===== 全局参数 =====
# 这一部分控制 Clash 的基础行为
# =========================================================
mixed-port: 7890          # 混合代理端口，支持 HTTP 和 SOCKS5
allow-lan: true           # 允许局域网设备连接你的代理
bind-address: "*"         # 监听所有地址；配合 allow-lan=true 时，局域网可访问
ipv6: false               # 关闭 IPv6，避免 IPv6 直连/漏代理问题
unified-delay: true       # 统一延迟测试方式，测速结果更稳定
tcp-concurrent: true      # TCP 并发优化，有助于提升连接建立速度
log-level: warning        # 日志级别：warning=只看警告；排错时可改成 info/debug
global-client-fingerprint: chrome   # 全局默认模拟 Chrome 指纹
keep-alive-idle: 600      # TCP keepalive 空闲时间
keep-alive-interval: 15   # keepalive 探测间隔

profile:
  store-selected: true    # 记住你在代理组里手动选择过的节点
  store-fake-ip: true     # 保存 fake-ip 映射缓存，提高体验


# =========================================================
# ===== 控制面板（当前未启用）=====
