# =========================================================
# ===== 代理组 =====
# 代理组是“规则最终指向哪里”的地方
# 你可以在客户端中手动选择各个组走哪个节点
# =========================================================
proxy-groups:
  # -------------------------
  # 顶层总选择组
  # include-all: true 表示把所有节点都加入该组供你选择
  # -------------------------
  - {name: Proxy,       type: select, include-all: true}

  # -------------------------
  # 各应用/服务分类组
  # 例如 Discord 命中规则后，就会走 Discord 这个组
  # 你可以手动指定 Discord 走 Proxy / DIRECT / 某个地区组
  # -------------------------
  - {name: Discord,     type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW, OTHERS1]}
  - {name: Telegram,    type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW, OTHERS1]}
  - {name: AI,          type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW, OTHERS1]}
  - {name: FCM,         type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW, OTHERS1]}
  - {name: YouTube,     type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW, OTHERS1]}
  - {name: Google,      type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Spotify,     type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Twitter,     type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: TikTok,      type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Netflix,     type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Steam,       type: select, proxies: [DIRECT, Proxy, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Github,      type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Microsoft,   type: select, proxies: [DIRECT, Proxy, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Cloudflare,  type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Speedtest,   type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: CN,          type: select, proxies: [DIRECT, Proxy, REJECT, JP, SG, US, HK, TW,OTHERS1]}
  - {name: Final,       type: select, proxies: [Proxy, DIRECT, REJECT, JP, SG, US, HK, TW,OTHERS1]}

  # -------------------------
  # 地区组
  # 这些组通过节点名称正则匹配自动收集对应地区节点
  # 所以节点命名越规范，分组越准确
  # -------------------------
  #- {name: HK,      type: select, include-all: true, filter: "(?=.*(港|HK|HongKong))^((?!(台|日|韩|新|美|TW|JP|SG|US)).)*$"}
  - {name: TW,      type: select, include-all: true, filter: "(?=.*(台|TW|Taiwan))^((?!(港|日|韩|新|美|HK|JP|SG|US)).)*$"}
  - {name: JP,      type: select, include-all: true, filter: "(?=.*(日|JP|Japan))^((?!(港|台|韩|新|美|HK|TW|SG|US)).)*$"}
  - {name: SG,      type: select, include-all: true, filter: "(?=.*(新加坡|坡|SG|Singapore))^((?!(港|台|日|韩|美|HK|TW|JP|US)).)*$"}
  - {name: US,      type: select, include-all: true, filter: "(?=.*(美|US|United States))^((?!(港|台|日|韩|新|SG|HK|TW|JP)).)*$"}

  # 其他节点，兜底组
  - {name: OTHERS1, type: select, include-all: true}


# =========================================================
# ===== 规则 =====
# 规则从上到下依次匹配
# 一旦命中某条规则，就不会继续往下匹配
# =========================================================
rules:
  - RULE-SET,R-fakeipfilter,DIRECT         # fake-ip 过滤相关域名直连
  - RULE-SET,R-private,DIRECT              # 私有域名/内网域名直连
  - RULE-SET,R-proxylite,Proxy             # 自定义代理规则走 Proxy

  - RULE-SET,R-discord,Discord             # Discord 相关域名走 Discord 组
  - RULE-SET,R-telegram,Telegram           # Telegram 相关域名走 Telegram 组
  - RULE-SET,R-ai,AI                       # AI 相关域名走 AI 组
  - RULE-SET,R-FCM,FCM                     # Google FCM 推送走 FCM 组
  - RULE-SET,R-youtube,YouTube             # YouTube 走 YouTube 组
  - RULE-SET,R-google,Google               # Google 走 Google 组
  - RULE-SET,R-spotify,Spotify             # Spotify 走 Spotify 组
  - RULE-SET,R-twitter,Twitter             # Twitter/X 走 Twitter 组
  - RULE-SET,R-tiktok,TikTok               # TikTok 走 TikTok 组
  - RULE-SET,R-netflix,Netflix             # Netflix 走 Netflix 组
  - RULE-SET,R-steam,Steam                 # Steam 走 Steam 组
  - RULE-SET,R-github,Github               # GitHub 走 Github 组
  - RULE-SET,R-microsoft,Microsoft         # Microsoft 走 Microsoft 组
  - RULE-SET,R-cloudflare,Cloudflare       # Cloudflare 走 Cloudflare 组
  - RULE-SET,R-speedtest,Speedtest         # Speedtest 走 Speedtest 组

  - RULE-SET,geolocation-!cn,Proxy         # 非中国大陆域名默认走代理
  - RULE-SET,geosite-cn,DIRECT             # 中国大陆域名直连

  - RULE-SET,R-telegram-ip,Telegram,no-resolve  # Telegram IP 段走 Telegram，避免再解析
  - RULE-SET,geoip-cn,DIRECT,no-resolve         # 中国 IP 直连，避免再解析

  - MATCH,Final                            # 前面都没匹配到时，走 Final 组


# =========================================================
# ===== 规则集锚点 =====
# 这是 YAML 的锚点写法，相当于定义模板，后面 rule-providers 复用
# 目的是减少重复书写
# =========================================================
rule-anchor:
  ip:           &ip           {type: http, interval: 86400,   behavior: ipcidr,      format: mrs }
  domain:       &domain       {type: http, interval: 86400,   behavior: domain,      format: mrs }
  yaml:         &yaml         {type: http, interval: 86400,   behavior: domain,      format: yaml}
  yaml-ip:      &yaml-ip      {type: http, interval: 86400,   behavior: ipcidr,      format: yaml}
  yaml-classic: &yaml-classic {type: http, interval: 86400,   behavior: classical,   format: yaml}
  list-class:   &list-class   {type: http, interval: 86400,   behavior: classical,   format: text}


# =========================================================
# ===== 规则集定义 =====
# Clash 会按这里提供的 URL 下载远程规则
# interval: 86400 表示每天更新一次
