rule-providers:
  # fake-ip 过滤规则
  R-fakeipfilter:                  {<<: *domain,       url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}

  # 私有域名 / 内网规则
  R-private:                       {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}

  # 你自定义的代理规则
  R-proxylite:                     {<<: *list-class,   url: "https://raw.githubusercontent.com/qichiyuhub/rule/refs/heads/main/proxy.list"}

  # 各种服务域名规则
  R-discord:                       {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/discord.mrs"}
  R-telegram:                      {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"}
  R-telegram-ip:                   {<<: *ip,           url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"}
  R-ai:                            {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs" }
  R-github:                        {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"}
  R-FCM:                           {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/googlefcm.mrs"}
  R-google:                        {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
  R-youtube:                       {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  R-spotify:                       {<<: *domain,       url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/spotify.mrs"}
