# =========================================================
# ===== TUN 入站 =====
# TUN 模式可以让系统流量自动进入 Clash 处理
# 适用于“不想每个软件单独设置代理”的场景
#
# 但你这里 auto-route / auto-redirect / auto-detect-interface 都是 false
# 说明：TUN 虽然开了，但“系统路由接管”交给外部处理
# 常用于路由器、容器、特殊网络环境
# 如果你是普通桌面客户端，这里可能需要改成 true 才能完整接管流量
# =========================================================
tun:
  enable: true
  stack: mixed                       # system/gvisor/mixed，这里用 mixed 兼容性较好
  dns-hijack: ["any:53", "tcp://any:53"]  # 劫持 DNS 请求到 Clash DNS

  # 使用 nikki 时，如果要指定接口，可取消下面注释
  #device: nikki

  # auto-route 关闭，表示由外部管理系统路由
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false


# =========================================================
# ===== DNS =====
# Clash 内置 DNS 配置
# 这是整份配置非常重要的部分
# 你当前使用的是 fake-ip 模式
# =========================================================
dns:
  enable: true
  cache-algorithm: arc           # DNS 缓存算法，提升命中效率
  listen: 0.0.0.0:1053           # DNS 监听地址和端口；0.0.0.0 表示局域网也可访问
  ipv6: false                    # DNS 不返回 IPv6 记录
  respect-rules: false           # DNS 查询不严格跟随分流规则；简单但有时精度稍差
  enhanced-mode: fake-ip         # 使用 fake-ip 模式，利于分流
  fake-ip-range: 28.0.0.1/8      # fake-ip 地址池范围
  fake-ip-filter-mode: blacklist # 黑名单模式：命中 fake-ip-filter 的域名不使用 fake-ip

  # 默认 DNS 服务器，一般用于启动初期或基础解析
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6

  # 代理服务器域名解析专用 DNS
  # 防止代理节点自己的域名解析失败
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 直连流量使用的 DNS
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 主 DNS 上游
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 下面这些域名不使用 fake-ip，而返回真实 IP
  # 常见于：局域网、Apple 服务、游戏、某些易出问题的服务
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.test"
    - "*.example"
    - "*.invalid"
    - "*.bogon"
    - "*.internal"
    - "*.localdomain"
    - "*.home.arpa"
    - "*.in-addr.arpa"
    - "*.ip6.arpa"
    - "*.127.in-addr.arpa"
    - "WORKGROUP"
    - "*.wpad"
    - "*.wpad.local"
    - "*.wpad.lan"
    - "*._dns.resolver.arpa"
    - "*._dns-sd._udp.local"
    - "*._dns-sd._udp.lan"
    - "*._googlecast._tcp.local"
    - "*._apple-mobdev2._tcp.local"
    - "*._universal-control._tcp.local"
    - "*._sleep-proxy._udp.local"
    - "Mijia Cloud"
    - "*.push.apple.com"
    - "*.adobe.io"
    - "*.mail.me.com.akadns.net"
    - "*.mail.icloud.com.cn"
    - "*.mail.me.com"
    - "*.certs-lb.apple.com.akadns.net"
    - "*.certs.apple.com"
    - "*.crl-lb.apple.com.akadns.net"
